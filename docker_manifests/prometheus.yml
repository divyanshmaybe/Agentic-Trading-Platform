global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'trading-platform'
    env: 'development'

# Load alert rules
rule_files:
  - 'alert-rules.yml'

scrape_configs:
  # ==========================================================================
  # Celery Exporter (Primary source for Celery cluster metrics)
  # ==========================================================================
  - job_name: 'celery-exporter'
    static_configs:
      - targets: ['celery-exporter:9540']
        labels:
          service: 'celery-exporter'
          environment: 'docker'
    metrics_path: /metrics
    scrape_interval: 15s

  # Celery Exporter (Local development - use host.docker.internal)
  - job_name: 'celery-exporter-local'
    static_configs:
      - targets: ['host.docker.internal:9540']
        labels:
          service: 'celery-exporter'
          environment: 'local'
    metrics_path: /metrics
    scrape_interval: 15s

  # ==========================================================================
  # Flower (Secondary metrics + queue depth)
  # ==========================================================================
  - job_name: 'flower'
    static_configs:
      - targets: ['flower:5555']
        labels:
          service: 'flower'
          environment: 'docker'
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'flower-local'
    static_configs:
      - targets: ['host.docker.internal:5555']
        labels:
          service: 'flower'
          environment: 'local'
    metrics_path: /metrics
    scrape_interval: 30s

  # ==========================================================================
  # API Servers - HTTP Metrics
  # ==========================================================================
  - job_name: 'auth-server'
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          service: 'auth-server'
          environment: 'local'
    metrics_path: /metrics
    
  - job_name: 'portfolio-server'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'portfolio-server'
          environment: 'local'
    metrics_path: /metrics

  # API Servers - Docker
  - job_name: 'auth-server-docker'
    static_configs:
      - targets: ['auth_server:4000']
        labels:
          service: 'auth-server'
          environment: 'docker'
    metrics_path: /metrics
    
  - job_name: 'portfolio-server-docker'
    static_configs:
      - targets: ['portfolio_server:8000']
        labels:
          service: 'portfolio-server'
          environment: 'docker'
    metrics_path: /metrics

  # ==========================================================================
  # Celery Workers (Local Development - use host.docker.internal from Docker)
  # ==========================================================================
  - job_name: 'celery-local-trading'
    static_configs:
      - targets: ['host.docker.internal:9101']
        labels:
          worker_pool: 'trading'
          environment: 'local'
          
  - job_name: 'celery-local-nse-pipeline'
    static_configs:
      - targets: ['host.docker.internal:9102']
        labels:
          worker_pool: 'nse_pipeline'
          environment: 'local'
          
  - job_name: 'celery-local-allocation'
    static_configs:
      - targets: ['host.docker.internal:9103']
        labels:
          worker_pool: 'allocation'
          environment: 'local'
          
  - job_name: 'celery-local-market'
    static_configs:
      - targets: ['host.docker.internal:9104']
        labels:
          worker_pool: 'market'
          environment: 'local'
          
  - job_name: 'celery-local-general'
    static_configs:
      - targets: ['host.docker.internal:9105']
        labels:
          worker_pool: 'general'
          environment: 'local'

  - job_name: 'celery-local-streaming'
    static_configs:
      - targets: ['host.docker.internal:9106']
        labels:
          worker_pool: 'streaming'
          environment: 'local'

  - job_name: 'celery-local-low-risk'
    static_configs:
      - targets: ['host.docker.internal:9107']
        labels:
          worker_pool: 'low_risk'
          environment: 'local'

  - job_name: 'celery-local-news-pipeline'
    static_configs:
      - targets: ['host.docker.internal:9108']
        labels:
          worker_pool: 'news_pipeline'
          environment: 'local'

  # Celery Workers (Docker - Distributed Architecture)
  - job_name: 'celery-docker-trading'
    static_configs:
      - targets: ['portfolio_celery_trading:9101']
        labels:
          worker_pool: 'trading'
          environment: 'docker'
          queue: 'trading'

  - job_name: 'celery-docker-nse-pipeline'
    static_configs:
      - targets: ['portfolio_celery_nse_pipeline:9102']
        labels:
          worker_pool: 'nse_pipeline'
          environment: 'docker'
          queue: 'nse_pipeline'

  - job_name: 'celery-docker-allocation'
    static_configs:
      - targets: ['portfolio_celery_allocation:9103']
        labels:
          worker_pool: 'allocation'
          environment: 'docker'
          queue: 'allocations'

  - job_name: 'celery-docker-market'
    static_configs:
      - targets: ['portfolio_celery_market:9104']
        labels:
          worker_pool: 'market'
          environment: 'docker'
          queue: 'market,tokens'

  - job_name: 'celery-docker-general'
    static_configs:
      - targets: ['portfolio_celery_general:9105']
        labels:
          worker_pool: 'general'
          environment: 'docker'
          queue: 'general,risk,orders'

  - job_name: 'celery-docker-streaming'
    static_configs:
      - targets: ['portfolio_celery_streaming:9106']
        labels:
          worker_pool: 'streaming'
          environment: 'docker'
          queue: 'streaming'

  - job_name: 'celery-docker-low-risk'
    static_configs:
      - targets: ['portfolio_celery_low_risk:9107']
        labels:
          worker_pool: 'low_risk'
          environment: 'docker'
          queue: 'low_risk_pipeline'

  - job_name: 'celery-docker-news-pipeline'
    static_configs:
      - targets: ['portfolio_celery_news_pipeline:9108']
        labels:
          worker_pool: 'news_pipeline'
          environment: 'docker'
          queue: 'news_pipeline,pipelines'

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121', 'redis-exporter:9121']
        
  # PostgreSQL Exporter
  - job_name: 'postgresql'
    static_configs:
      - targets: ['host.docker.internal:9187', 'postgres-exporter:9187']
