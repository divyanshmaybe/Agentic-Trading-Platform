apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: agent-invest
data:
  NODE_ENV: production
  PORT: "4000"
  REDIS_HOST: auth-redis
  REDIS_PORT: "6379"
  REDIS_URL: redis://auth-redis:6379
  PORTFOLIO_SERVICE_URL: http://portfolio-server:8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: agent-invest
data:
  PORT: "8000"
  AUTH_SERVER_URL: http://auth-server:4000
  PORTFOLIO_SERVICE_URL: http://portfolio-server:8000
  REDIS_HOST: portfolio-redis
  REDIS_PORT: "6379"
  CELERY_BROKER_URL: redis://portfolio-redis:6379/0
  CELERY_RESULT_BACKEND: redis://portfolio-redis:6379/1
  MARKET_DATA_PROVIDER: finnhub
  MARKET_DATA_WS_URL: wss://example.org/dummy
  ENABLE_NIFTY500_PREFETCH: "false"
  PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: agent-invest
data:
  PORT: "3000"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_API_BASE_URL: http://api.localhost
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'auth-server'
        static_configs:
          - targets: ['auth-server:4000']
      - job_name: 'portfolio-server'
        static_configs:
          - targets: ['portfolio-server:8000']
      - job_name: 'frontend'
        static_configs:
          - targets: ['frontend:3000']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
data:
  loki.yml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    ingester:
      wal:
        enabled: true
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
    schema_config:
      configs:
        - from: 2024-01-01
          store: boltdb
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    storage_config:
      boltdb:
        directory: /loki/index
      filesystem:
        directory: /loki/chunks
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100

