apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: agent-invest
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: agent-invest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: punhaniabhishek/agent-invest-frontend:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: frontend-config
          ports:
            - containerPort: 3000
              name: http
          command:
            - sh
            - -c
            - pnpm --filter frontend exec next start -H 0.0.0.0 -p ${PORT:-3000}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-server
  namespace: agent-invest
  labels:
    app: auth-server
spec:
  selector:
    app: auth-server
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  namespace: agent-invest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  template:
    metadata:
      labels:
        app: auth-server
    spec:
      containers:
        - name: auth-server
          image: punhaniabhishek/agent-invest-auth-server:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-env-secret
          ports:
            - containerPort: 4000
              name: http
          command:
            - sh
            - -c
            - |
              pnpm prisma generate && \
              pnpm prisma db push && \
              pnpm run start
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-server
  namespace: agent-invest
  labels:
    app: portfolio-server
spec:
  selector:
    app: portfolio-server
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-server
  namespace: agent-invest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-server
  template:
    metadata:
      labels:
        app: portfolio-server
    spec:
      containers:
        - name: portfolio-server
          image: punhaniabhishek/agent-invest-portfolio-server:latest
          imagePullPolicy: Always
          env:
            - name: PYTHONPATH
              value: "/app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py"
          envFrom:
            - configMapRef:
                name: portfolio-config
            - secretRef:
                name: portfolio-env-secret
          ports:
            - containerPort: 8000
              name: http
          command:
            - sh
            - -c
            - |
              python -m prisma generate && \
              until python -m prisma db push --accept-data-loss; do \
                echo "Waiting for Postgres..."; \
                sleep 2; \
              done && \
              uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-celery-allocations
  namespace: agent-invest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-celery-allocations
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: portfolio-celery-allocations
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: portfolio-celery-allocations
      containers:
        - name: worker
          image: punhaniabhishek/agent-invest-portfolio-server:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: portfolio-config
            - secretRef:
                name: portfolio-env-secret
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          command:
            - sh
            - -c
            - |
              python -m prisma generate && \
              until python -m prisma db push --accept-data-loss; do \
                echo "Waiting for Postgres..."; \
                sleep 2; \
              done && \
              exec celery -A celery_app:celery_app worker \
                --loglevel=${CELERY_LOG_LEVEL:-info} \
                --queues=${CELERY_QUEUE_ALLOCATIONS} \
                --concurrency=${CELERY_CONCURRENCY_ALLOCATIONS:-2} \
                --prefetch-multiplier=${CELERY_PREFETCH_ALLOCATIONS:-1} \
                --hostname=%h.allocations \
                --events
          readinessProbe:
            exec:
              command:
                - python
                - /app/apps/portfolio-server/scripts/celery_healthcheck.py
            initialDelaySeconds: 20
            periodSeconds: 20
          livenessProbe:
            exec:
              command:
                - python
                - /app/apps/portfolio-server/scripts/celery_healthcheck.py
            initialDelaySeconds: 40
            periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portfolio-celery-allocations
  namespace: agent-invest
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: portfolio-celery-allocations
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: portfolio-celery-allocations
  namespace: agent-invest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portfolio-celery-allocations
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
