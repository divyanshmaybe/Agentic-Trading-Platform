apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-celery-flower
  namespace: agent-invest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-celery-flower
  template:
    metadata:
      labels:
        app: portfolio-celery-flower
    spec:
      containers:
        - name: flower
          image: mher/flower:2.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: FLOWER_PORT
              value: "5555"
            - name: FLOWER_BASIC_AUTH
              value: admin:admin
          envFrom:
            - secretRef:
                name: portfolio-env-secret
          command:
            - sh
            - -c
            - |
              exec /home/flower \
                --port=${FLOWER_PORT:-5555} \
                --broker=${CELERY_BROKER_URL} \
                --basic_auth=${FLOWER_BASIC_AUTH:-admin:admin} \
                --persistent=True \
                --db=/data/flower.db
          ports:
            - name: http
              containerPort: 5555
          volumeMounts:
            - name: flower-data
              mountPath: /data
      volumes:
        - name: flower-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-celery-flower
  namespace: agent-invest
spec:
  selector:
    app: portfolio-celery-flower
  ports:
    - name: http
      port: 5555
      targetPort: 5555
---
