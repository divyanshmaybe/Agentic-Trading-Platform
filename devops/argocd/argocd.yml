apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pathway-submission
  namespace: argocd
spec:
  # Project to which this application belongs
  project: default

  # Source repository configuration
  # Sync resources from devops/kubernetes directory
  # ArgoCD will automatically track and prune resources it created from this path
  source:
    repoURL: https://github.com/Abhishek-Punhani/Agentic-Trading-Platform-Pathway.git
    targetRevision: main
    path: devops/kubernetes
    # Directory-based application - only resources in kubernetes directory are managed
    directory:
      recurse: false
      include: "*.yaml"
      exclude: "create-secrets.sh,start.sh,destroy.sh,README.md,PORT_MAPPING.md,kind-config.yaml,metrics-server.yaml"

  # Destination cluster and namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: agent-invest
  
  # Sync policy for automated deployments and self-healing
  syncPolicy:
    automated:
      # Automatically sync when Git repository changes
      prune: true
      # Self-healing: automatically sync when cluster state deviates from Git
      selfHeal: true
      # Allow empty resources (optional, useful for initialization)
      allowEmpty: false
    
    # Sync options for declarative management
    syncOptions:
      # Create namespace if it doesn't exist
      - CreateNamespace=true
      # Validate resources before applying
      - Validate=true
      # Use server-side apply for better conflict resolution
      - ServerSideApply=true
      # Prune last to avoid dependency issues (ensures resources are deleted after dependencies)
      - PruneLast=true

    # Retry policy for failed syncs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health assessment and status
  ignoreDifferences: []

  # Revision history limit
  revisionHistoryLimit: 10
