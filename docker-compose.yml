services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru &
             sleep 2 &&
             redis-cli FLUSHALL &&
             echo 'Auth Redis: Cleared all locks and timestamps' &&
             wait"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Portfolio PostgreSQL Database
  portfolio_postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    command: postgres -c max_connections=50 -c shared_buffers=256MB
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_password
      POSTGRES_DB: portfolio_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - portfolio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Portfolio Redis Cache & Queue
  portfolio_redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru &
             sleep 2 &&
             redis-cli FLUSHALL &&
             echo 'Portfolio Redis: Cleared all locks and timestamps' &&
             wait"
    ports:
      - "6381:6379"
    volumes:
      - portfolio_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Auth Server Application
  auth_server:
    image: auth_server:latest
    container_name: auth_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/auth_server/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      CLIENT_URL: http://localhost:3000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
    working_dir: /app/apps/auth_server
    command: >
      sh -c "pnpm prisma generate --schema ../../shared/prisma/schema.prisma &&
             pnpm prisma db push --schema ../../shared/prisma/schema.prisma &&
             pnpm run start"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agentInvest

  # Notification Server (Kafka Consumer -> Redis Publisher)
  notification_server:
    image: notification_server:latest
    container_name: notification_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/notification_server/Dockerfile
    env_file:
      - .env
      - apps/portfolio-server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: notification-server
      KAFKA_GROUP_ID: notifications-consumer
      KAFKA_ENABLED: "true"
      INTERNAL_SERVICE_SECRET: agentinvest-secret
    working_dir: /app
    command: >
      sh -c "cd apps/notification_server && pnpm prisma generate --schema /app/shared/prisma/schema.prisma &&
             pnpm prisma db push --schema /app/shared/prisma/schema.prisma --accept-data-loss &&
             node -r tsconfig-paths/register dist/apps/notification_server/src/index.js"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*index.js' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - agentInvest

  # Portfolio Server (FastAPI)
  portfolio_server:
    image: portfolio_server:latest
    container_name: portfolio_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/portfolio-server/Dockerfile
    env_file:
      - .env
      - apps/portfolio-server/.env
    environment:
      PORT: 8000
      SKIP_DOTENV: "true"
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      SHADOW_DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: portfolio_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      CLIENT_URL: http://localhost:3000
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      # Override Kafka config for Docker networking
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: portfolio-server
      KAFKA_ENABLED: "true"
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push --accept-data-loss; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Celery Worker - Trading Queue (Real-time trade execution)
  portfolio_celery_trading:
    image: portfolio_server:latest
    container_name: portfolio_celery_trading
    restart: unless-stopped
    env_file:
