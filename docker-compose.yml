                 sleep 2;
               done &&
               celery -A celery_app:celery_app worker --loglevel=info -Q streaming --concurrency=1 --hostname=streaming@%h --max-tasks-per-child=1 --prefetch-multiplier=1 --without-heartbeat --without-gossip"
    ports:
      - "9106:9106"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
      - ./scripts:/app/scripts
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Celery Beat (Scheduler for periodic tasks)
  portfolio_celery_beat:
    image: portfolio_server:latest
    container_name: portfolio_celery_beat
    restart: unless-stopped
    env_file:
      - .env
      - apps/portfolio-server/.env
    environment:
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      SKIP_DOTENV: "true"
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      SHADOW_DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: portfolio_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
      REDBEAT_REDIS_URL: redis://portfolio_redis:6379/0
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      PROMETHEUS_ENABLED: "false"
      # Override Kafka config for Docker networking
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: portfolio-celery-beat
      KAFKA_ENABLED: "true"
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push --accept-data-loss; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               celery -A celery_app:celery_app beat --loglevel=info -S redbeat.RedBeatScheduler"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
      - ./scripts:/app/scripts
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
      portfolio_celery_trading:
        condition: service_started
      portfolio_celery_nse_pipeline:
        condition: service_started
      portfolio_celery_news_pipeline:
        condition: service_started
      portfolio_celery_low_risk:
        condition: service_started
      portfolio_celery_allocation:
        condition: service_started
      portfolio_celery_market:
        condition: service_started
      portfolio_celery_general:
        condition: service_started
      portfolio_celery_streaming:
        condition: service_started
    networks:
      - agentInvest

  # Flower (Celery monitoring dashboard)
  flower:
    image: portfolio_server:latest
    container_name: flower
    restart: unless-stopped
    env_file:
      - .env
      - apps/portfolio-server/.env
    environment:
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      SKIP_DOTENV: "true"
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
      REDIS_HOST: portfolio_redis
      REDIS_PORT: 6379
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               pip install flower &&
               celery -A celery_app:celery_app flower --port=5555 --basic_auth=admin:admin123 --broker_api=redis://portfolio_redis:6379/0"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
      - ./scripts:/app/scripts
    ports:
      - "5555:5555"
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
      portfolio_celery_trading:
        condition: service_started
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Frontend (Next.js)
  frontend:
    image: frontend_web:latest
    container_name: frontend_web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
      - apps/portfolio-server/.env
    environment:
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      AUTH_SERVER_URL: http://auth_server:4000
      INTERNAL_SERVICE_SECRET: agentinvest-secret
    working_dir: /app/apps/frontend
    command: >
      sh -c "pnpm --filter frontend exec next start -H 0.0.0.0 -p ${PORT:-3000}"
    # NOTE: No volumes mounted for production - use the built .next from the image
    ports:
      - "3000:3000"
    depends_on:
      auth_server:
        condition: service_started
    networks:
      - agentInvest

  # Apache Kafka (KRaft mode)
  kafka:
    image: apache/kafka:3.8.0
    container_name: pathway-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - agentInvest

  # Optional: Redis Commander (Redis GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: auth:redis:6379,portfolio:portfolio_redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - portfolio_redis
    networks:
      - agentInvest
    profiles:
      - debug

  # Optional: pgAdmin (PostgreSQL GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
      - portfolio_postgres
    networks:
      - agentInvest
    profiles:
      - debug

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker_manifests/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Grafana (Visualization Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./devops/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./devops/monitoring/celery-dashboard.json:/var/lib/grafana/dashboards/celery-dashboard.json:ro
      - ./devops/monitoring/celery-detailed-dashboard.json:/var/lib/grafana/dashboards/celery-detailed-dashboard.json:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Redis Exporter (Optional - for Redis metrics)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://portfolio_redis:6379
    depends_on:
      - portfolio_redis
    networks:
      - agentInvest
    profiles:
      - monitoring

  # PostgreSQL Exporter (Optional - for DB metrics)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db?sslmode=disable
    depends_on:
      portfolio_postgres:
        condition: service_healthy
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Loki (Log Aggregation)
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker_manifests/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Promtail (Log Shipping to Loki)
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker_manifests/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - agentInvest
    profiles:
      - monitoring

networks:
  agentInvest:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  portfolio_postgres_data:
    driver: local
  portfolio_redis_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
