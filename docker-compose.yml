services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Portfolio PostgreSQL Database
  portfolio_postgres:
    image: postgres:16-alpine
    container_name: portfolio_postgres
    restart: unless-stopped
    command: postgres -c max_connections=50 -c shared_buffers=256MB
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_password
      POSTGRES_DB: portfolio_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - portfolio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Portfolio Redis Cache & Queue
  portfolio_redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - portfolio_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Auth Server Application
  auth_server:
    image: auth_server:latest
    container_name: auth_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/auth_server/Dockerfile
    env_file:
      - .env
      - apps/auth_server/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      CLIENT_URL: http://localhost:3000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    working_dir: /app/apps/auth_server
    command: >
      sh -c "pnpm prisma generate --schema ../../shared/prisma/schema.prisma &&
             pnpm prisma db push --schema ../../shared/prisma/schema.prisma &&
             pnpm run start"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agentInvest

  # Notification Server (Kafka Consumer -> Redis Publisher)
  notification_server:
    image: notification_server:latest
    container_name: notification_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/notification_server/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: notification-server
      KAFKA_GROUP_ID: notifications-consumer
      KAFKA_ENABLED: "true"
    working_dir: /app
    command: >
      sh -c "cd apps/notification_server && pnpm prisma generate --schema /app/shared/prisma/schema.prisma &&
             pnpm prisma db push --schema /app/shared/prisma/schema.prisma --accept-data-loss &&
             node -r tsconfig-paths/register dist/apps/notification_server/src/index.js"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*index.js' > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - agentInvest

  # Portfolio Server (FastAPI)
  portfolio_server:
    image: portfolio_server:latest
    container_name: portfolio_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/portfolio-server/Dockerfile
    env_file:
      - apps/portfolio-server/docker.env
    environment:
      PORT: 8000
      SKIP_DOTENV: "true"
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      SHADOW_DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: portfolio_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      CLIENT_URL: http://localhost:3000
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push --accept-data-loss; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
    ports:
      - "8000:8000"
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Celery worker (Portfolio pipelines & tasks)
  portfolio_celery:
    image: portfolio_server:latest
    container_name: portfolio_celery
    restart: unless-stopped
    env_file:
      - apps/portfolio-server/docker.env
    environment:
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      SKIP_DOTENV: "true"
      CELERY_WORKER_RUNNING: "1"
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      SHADOW_DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: portfolio_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      PORTFOLIO_RISK_MONITOR_ENABLED: "false"
      PROMETHEUS_ENABLED: "true"
      PROMETHEUS_PORT: "9100"
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push --accept-data-loss; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               celery -A celery_app:celery_app worker --loglevel=info"
    ports:
      - "9100:9100"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Celery Beat (Scheduler for periodic tasks)
  portfolio_celery_beat:
    image: portfolio_server:latest
    container_name: portfolio_celery_beat
    restart: unless-stopped
    env_file:
      - apps/portfolio-server/docker.env
    environment:
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      SKIP_DOTENV: "true"
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      SHADOW_DATABASE_URL: postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: portfolio_redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      PROMETHEUS_ENABLED: "false"
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push --accept-data-loss; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               celery -A celery_app:celery_app beat --loglevel=info"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
    depends_on:
      portfolio_postgres:
        condition: service_healthy
      portfolio_redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Flower (Celery monitoring dashboard)
  flower:
    image: portfolio_server:latest
    container_name: flower
    restart: unless-stopped
    environment:
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      SKIP_DOTENV: "true"
      CELERY_BROKER_URL: redis://portfolio_redis:6379/0
      CELERY_RESULT_BACKEND: redis://portfolio_redis:6379/1
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               pip install flower &&
               celery -A celery_app:celery_app flower --port=5555 --basic_auth=admin:admin123"
    ports:
      - "5555:5555"
    depends_on:
      portfolio_redis:
        condition: service_healthy
      portfolio_celery:
        condition: service_started
    networks:
      - agentInvest
    profiles:
      - debug

  # Frontend (Next.js)
  frontend:
    image: frontend_web:latest
    container_name: frontend_web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
    working_dir: /app/apps/frontend
    command: >
      sh -c "pnpm --filter frontend exec next start -H 0.0.0.0 -p ${PORT:-3000}"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
      - ./shared:/app/shared
      - ./types:/app/types
    ports:
      - "3000:3000"
    depends_on:
      auth_server:
        condition: service_started
    networks:
      - agentInvest

  # Apache Kafka (KRaft mode)
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.8.0}
    container_name: ${KAFKA_CONTAINER_NAME:-pathway-kafka}
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - agentInvest

  # Optional: Redis Commander (Redis GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - agentInvest
    profiles:
      - debug

  # Optional: pgAdmin (PostgreSQL GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - agentInvest
    profiles:
      - debug

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./devops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Grafana (Visualization Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/monitoring/celery-dashboard.json:/etc/grafana/provisioning/dashboards/celery-dashboard.json:ro
    depends_on:
      - prometheus
    networks:
      - agentInvest
    profiles:
      - monitoring

  # Redis Exporter (Optional - for Redis metrics)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://portfolio_redis:6379
    depends_on:
      - portfolio_redis
    networks:
      - agentInvest
    profiles:
      - monitoring

  # PostgreSQL Exporter (Optional - for DB metrics)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://portfolio_user:portfolio_password@portfolio_postgres:5432/portfolio_db?sslmode=disable
    depends_on:
      portfolio_postgres:
        condition: service_healthy
    networks:
      - agentInvest
    profiles:
      - monitoring

networks:
  agentInvest:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  portfolio_postgres_data:
    driver: local
  portfolio_redis_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
