services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: auth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentInvest

  # Auth Server Application
  auth_server:
    image: auth_server:latest
    container_name: auth_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/auth_server/Dockerfile
    env_file:
      - .env
      - apps/auth_server/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agentInvest

  # Portfolio Server (FastAPI)
  portfolio_server:
    image: portfolio_server:latest
    container_name: portfolio_server
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/portfolio-server/Dockerfile
    env_file:
      - .env
      - apps/portfolio-server/docker.env
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      SHADOW_DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      GEMINI_API_KEY: dummy
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Celery worker (Portfolio pipelines & tasks)
  portfolio_celery:
    image: portfolio_server:latest
    container_name: portfolio_celery
    restart: unless-stopped
    env_file:
      - .env
      - apps/portfolio-server/docker.env
    environment:
      PYTHONPATH: /app:/app/apps/portfolio-server:/app/shared/py:/app/middleware/py
      DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      SHADOW_DATABASE_URL: postgresql://auth_user:auth_password@postgres:5432/auth_db
      AUTH_SERVER_URL: http://auth_server:4000
      PORTFOLIO_SERVICE_URL: http://portfolio_server:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      INTERNAL_SERVICE_SECRET: agentinvest-secret
      GEMINI_API_KEY: dummy
    working_dir: /app/apps/portfolio-server
    command: >
      bash -c "python -m prisma generate &&
               until python -m prisma db push; do
                 echo 'Waiting for Postgres...';
                 sleep 2;
               done &&
               celery -A celery_app:celery_app worker --loglevel=info --beat"
    volumes:
      - ./apps/portfolio-server:/app/apps/portfolio-server
      - ./shared:/app/shared
      - ./middleware:/app/middleware
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentInvest

  # Frontend (Next.js)
  frontend:
    image: frontend_web:latest
    container_name: frontend_web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
    working_dir: /app/apps/frontend
    command: >
      bash -c "pnpm --filter frontend run start -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - ./packages:/app/packages
      - ./shared:/app/shared
      - ./types:/app/types
    ports:
      - "3000:3000"
    depends_on:
      auth_server:
        condition: service_started
    networks:
      - agentInvest

  # Apache Kafka (KRaft mode)
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.8.0}
    container_name: ${KAFKA_CONTAINER_NAME:-pathway-kafka}
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - agentInvest

  # Optional: Redis Commander (Redis GUI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - agentInvest
    profiles:
      - debug

  # Optional: pgAdmin (PostgreSQL GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - agentInvest
    profiles:
      - debug

networks:
  agentInvest:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
